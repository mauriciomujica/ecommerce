<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="#" onclick="showSection('productos')">Productos</a>
        <a href="#" onclick="showSection('pedidos')">Pedidos</a>
    </nav>
    <div id="notification" class="hidden"></div>

    <main>
        <section id="home" class="active">
        </section>

        <section id="productos">
            <div class="section-header">
                <div>
                    <h2>Productos</h2>
                    <input type="text" id="producto-search" placeholder="Buscar por nombre o ID..." onkeydown="if(event.key==='Enter') searchProductos()">
                    <button onclick="searchProductos()">Buscar</button>
                </div>
                <button onclick="showForm('producto')">Crear Producto</button>
            </div>
            <div class="sort-controls">
                <label>Ordenar por:</label>
                <select id="producto-sort-field" onchange="sortProductos()">
                    <option value="id" selected>ID</option>
                    <option value="precio">Precio</option>
                    <option value="nombre">Nombre</option>
                    <option value="categoria">Categoría</option>
                    <option value="stock">Stock</option>
                </select>
                <select id="producto-sort-order" onchange="sortProductos()">
                    <option value="asc">Ascendente</option>
                    <option value="desc">Descendente</option>
                </select>
            </div>
            <table id="productos-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Stock</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Subcategoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="producto-form-container" class="hidden">
                <form id="producto-form">
                    <input type="hidden" id="producto-id">
                    <input type="text" id="producto-nombre" placeholder="Nombre" required>
                    <input type="number" id="producto-stock" placeholder="Stock" required>
                    <input type="number" step="0.01" id="producto-precio" placeholder="Precio" required>
                    <select id="producto-categoria" required></select>
                    <select id="producto-subcategoria" required></select>
                    <button type="submit">Guardar</button>
                    <button type="button" onclick="hideForm('producto')">Cancelar</button>
                </form>
            </div>
        </section>

        <section id="pedidos">
            <div class="section-header">
                <div>
                    <h2>Pedidos</h2>
                    <input type="number" id="pedido-search" placeholder="Buscar por ID..." onkeydown="if(event.key==='Enter') searchPedidos()">
                    <button onclick="searchPedidos()">Buscar</button>
                </div>
                <button onclick="showForm('pedido')">Crear Pedido</button>
            </div>
            <div class="sort-controls">
                <label>Ordenar por:</label>
                <select id="pedido-sort-field" onchange="sortPedidos()">
                    <option value="id" selected>ID</option>
                    <option value="precioFinalPedido">Precio Final</option>
                </select>
                <select id="pedido-sort-order" onchange="sortPedidos()">
                    <option value="asc">Ascendente</option>
                    <option value="desc">Descendente</option>
                </select>
            </div>
            <table id="pedidos-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Items</th>
                        <th>Precio Final</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="pedido-form-container" class="hidden">
                <form id="pedido-form">
                    <div id="pedido-items"></div>
                    <button type="button" onclick="addItem()">Agregar Item</button>
                    <button type="submit">Guardar</button>
                    <button type="button" onclick="hideForm('pedido')">Cancelar</button>
                </form>
            </div>
        </section>
    </main>

    <script src="script/app.js"></script>
</body>
</html>
